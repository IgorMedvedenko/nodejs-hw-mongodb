tags:
  - Contacts
summary: Create a new contact
operationId: createContact
description: Create a new contact entry for the authenticated user.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          name:
            type: string
            description: Name of the contact.
            example: Jane Doe
          phoneNumber:
            type: string
            description: Phone number of the contact.
            example: '+380998765432'
          email:
            type: string
            format: email
            description: Email address of the contact.
            example: jane.doe@example.com
          isFavourite:
            type: boolean
            description: Indicates if the contact is a favourite.
            example: true
          contactType:
            type: string
            enum: [work, home, personal]
            description: Type of contact.
            example: work
        required:
          - name
          - phoneNumber
          - contactType
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            description: Name of the contact.
            example: Jane Doe
          phoneNumber:
            type: string
            description: Phone number of the contact.
            example: '+380998765432'
          email:
            type: string
            format: email
            description: Email address of the contact.
            example: jane.doe@example.com
          isFavourite:
            type: boolean
            description: Indicates if the contact is a favourite.
            example: true
          contactType:
            type: string
            enum: [work, home, personal]
            description: Type of contact.
            example: work
          photo:
            type: string
            format: binary
            description: Profile photo of the contact.
        required:
          - name
          - phoneNumber
          - contactType
responses:
  201:
    description: Contact successfully created.
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: number
              example: 201
            message:
              type: string
              example: 'Successfully created a contact!'
            data:
              $ref: ../../components/schemas/contact.yaml
  400:
    description: Invalid request body.
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: number
              example: 400
            message:
              type: string
              example: 'Validation error'
