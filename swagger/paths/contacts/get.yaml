tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Retrieve a list of all contacts belonging to the authenticated user, with optional pagination, sorting, and filtering.
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      minimum: 1
      default: 1
    description: Page number for pagination.
  - in: query
    name: perPage
    schema:
      type: integer
      minimum: 1
      default: 10
    description: Number of contacts per page.
  - in: query
    name: sortBy
    schema:
      type: string
      enum: [name, email, phoneNumber, createdAt, updatedAt]
      default: createdAt
    description: Field to sort by.
  - in: query
    name: sortOrder
    schema:
      type: string
      enum: [asc, desc]
      default: asc
    description: Sort order (ascending or descending).
  - in: query
    name: contactType
    schema:
      type: string
      enum: [work, home, personal]
    description: Filter contacts by type.
  - in: query
    name: isFavourite
    schema:
      type: boolean
    description: Filter contacts by favourite status.
responses:
  200:
    description: Successfully retrieved contacts.
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: number
              example: 200
            message:
              type: string
              example: 'Successfully found contacts!'
            data:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    $ref: ../../components/schemas/contact.yaml
                totalItems:
                  type: number
                  example: 50
                totalPages:
                  type: number
                  example: 5
                page:
                  type: number
                  example: 1
                perPage:
                  type: number
                  example: 10
