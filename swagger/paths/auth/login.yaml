tags:
  - Auth
summary: Log in a user
operationId: loginUser
description: Authenticate a user with email and password to receive access and refresh tokens.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          email:
            type: string
            format: email
            example: user@example.com
          password:
            type: string
            format: password
            example: StrongPassword123
        required:
          - email
          - password
responses:
  200:
    description: User logged in successfully.
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: number
              example: 200
            message:
              type: string
              example: 'Successfully logged in!'
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
                refreshToken:
                  type: string
                  example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
  401:
    description: Invalid credentials.
  400:
    description: Validation error.
